<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vídeo Fullscreen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
    }

    /* Vídeo ocupa a tela inteira sem distorcer */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* mantém proporção */
      z-index: -1;
    }

    /* Conteúdo por cima */
    .content {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      top: 40%;
      text-shadow: 0 0 10px rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="amizade.mp4" type="video/mp4">
    Seu navegador não suporta vídeo.
  </video>

  <div class="content">
    <h1>Meu Site</h1>
    <p>Conteúdo por cima do vídeo</p>
  </div>

</body>
</html>
